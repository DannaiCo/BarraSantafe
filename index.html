<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lenguajes del amor</title>

<style>
html, body {
  margin:0;
  padding:0;
  width:2560px;
  height:1440px;
  overflow:hidden;
  font-family: Arial, sans-serif;
}

.contenedor {
  position: relative;
  width:2560px;
  height:1440px;
}

/* VIDEO */
#fondoVideo {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

/* =========================
   BARRAS (COORDENADAS)
========================= */

#barra-pasion   { position:absolute; top:624px; left:1655px; }
#barra-tension  { position:absolute; top:624px; left:3352px; }
#barra-familia  { position:absolute; top:1602px; left:1655px; }
#barra-cerveza  { position:absolute; top:1602px; left:3352px; }

/* =========================
   PORCENTAJES (COORDENADAS)
========================= */

#pasion-texto   { position:absolute; top:488px; left:1181px; }
#tension-texto  { position:absolute; top:488px; left:3028px; }
#familia-texto  { position:absolute; top:1484px; left:1223px; }
  #cerveza-texto  { position:absolute; top:1484px; left:2972px; }

/* =========================
   ESTILOS
========================= */

.barra {
  width: 617px;
  height: 38px;
  background:#80806f;
  border-radius: 20px;
  overflow: visible; /* 🔥 CAMBIO CLAVE */
}

.relleno {
  position: relative;
  height: 100%;
  width: 0%;
  background: #0ed1f3;
  border-radius: 20px; /* 🔥 mantiene bordes suaves */
  transition: width 0.8s ease;

}

  .porcentaje {
  font-weight: bold;
  color: #0ed1f3;
}

/* número grande */
.numero {
  font-size: 215px;
}

/* % pequeño */
.simbolo {
  font-size: 92px;
  margin-left: 5px;
}
  .ball {
  position: absolute;
  right: -48px; /* 🔥 lo saca un poco para que no quede cortado */
  top: 50%;
  transform: translateY(-50%);
  width: 143px; /* ajusta tamaño */
  height: 78px;
  pointer-events: none;
}

</style>
</head>

<body>
<div class="contenedor">

  <!-- VIDEO -->
  <video autoplay muted loop playsinline id="fondoVideo">
    <source src="fondo.mp4" type="video/mp4">
  </video>

  <!-- BARRAS -->
  <div id="barra-pasion" class="barra">
  <div id="pasion" class="relleno">
    <img src="Ball.png" class="ball">
  </div>
</div>

  <div id="barra-tension" class="barra">
  <div id="tension" class="relleno">
    <img src="Ball.png" class="ball">
  </div>
</div>

  <div id="barra-familia" class="barra">
  <div id="familia" class="relleno">
    <img src="Ball.png" class="ball">
  </div>
</div>

<div id="barra-cerveza" class="barra">
  <div id="cerveza" class="relleno">
    <img src="Ball.png" class="ball">
  </div>
</div>

  <!-- PORCENTAJES -->
  <div id="pasion-texto" class="porcentaje">
  <span class="numero">0</span><span class="simbolo">%</span>
</div>
  <div id="tension-texto" class="porcentaje">
  <span class="numero">0</span><span class="simbolo">%</span>
</div>
  <div id="familia-texto" class="porcentaje">
  <span class="numero">0</span><span class="simbolo">%</span>
</div>
  <div id="cerveza-texto" class="porcentaje">
  <span class="numero">0</span><span class="simbolo">%</span>
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxCRYw26GF73jfQ9Y0ptihuo6V9cApb9mv-Da4CMmDy_ZVQhDe-4s3jxmFJX77zQK0S_A/exec";

function actualizar() {
  fetch(URL)
    .then(r => r.json())
    .then(data => {

      const resultados = data.resultados;

      const pasion = Math.round(resultados["Pasión"].porcentaje);
      const tension = Math.round(resultados["Tensión"].porcentaje);
      const familia = Math.round(resultados["Familia y amigos"].porcentaje);
     const cerveza = Math.round(resultados["Cerveza"].porcentaje);

      // BARRAS
      document.getElementById("pasion").style.width = pasion + "%";
      document.getElementById("tension").style.width = tension + "%";
      document.getElementById("familia").style.width = familia + "%";
      document.getElementById("cerveza").style.width = cerveza + "%";

      // TEXTOS
      document.querySelector("#pasion-texto .numero").innerText = pasion;
      document.querySelector("#tension-texto .numero").innerText = tension;
document.querySelector("#familia-texto .numero").innerText = familia;
document.querySelector("#cerveza-texto .numero").innerText = cerveza;

    });
}

actualizar();
setInterval(actualizar, 5000);

</script>

</body>
</html>
