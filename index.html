<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Barra Mundial</title>

<style>
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  background:#000;
  font-family: Arial, sans-serif;
}

/* 🔥 LIENZO FIJO (TU DISEÑO) */
.contenedor {
  position:absolute;
  width:2560px;
  height:1440px;
  transform-origin: top left;
}

/* 🔥 VIDEO FULL SCREEN REAL (NO DEJA BORDES) */
#fondoVideo {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  transform: translate(-50%, -50%);
  z-index: -1;
}

/* =========================
   BARRAS (COORDENADAS)
========================= */

#barra-pasion   { position:absolute; top:476px; left:830px; }
#barra-tension  { position:absolute; top:476px; left:1604px; }
#barra-familia  { position:absolute; top:950px; left:830px; }
#barra-cerveza  { position:absolute; top:949px; left:1595px; }

/* =========================
   PORCENTAJES (COORDENADAS)
========================= */

#pasion-texto   { position:absolute; top:394px; left:601px; }
#tension-texto  { position:absolute; top:394px; left:1369px; }
#familia-texto  { position:absolute; top:873px; left:601px; }
#cerveza-texto  { position:absolute; top:872px; left:1369px; }

/* =========================
   ESTILOS
========================= */

.barra {
  width: 280px;
  height: 19px;
  background:#80806f;
  border-radius: 20px;
  overflow: visible;
}

.relleno {
  position: relative;
  height: 100%;
  width: 0%;
  background: #0ed1f3;
  border-radius: 20px;
  transition: width 0.8s ease;
}

.porcentaje {
  font-weight: bold;
  color: #0ed1f3;
}

/* número grande */
.numero {
  font-size: 118px;
}

/* % pequeño */
.simbolo {
  font-size: 64px;
  margin-left: 5px;
}

/* ⚽ balón */
.ball {
  position: absolute;
  right: -48px;
  top: 50%;
  transform: translateY(-50%);
  width: 103px;
  height: 59px;
  pointer-events: none;
}

</style>
</head>

<body>

<!-- 🎥 VIDEO GLOBAL -->
<video autoplay muted loop playsinline id="fondoVideo">
  <source src="fondo.mp4" type="video/mp4">
</video>

<div class="contenedor" id="contenedor">

  <!-- BARRAS -->
  <div id="barra-pasion" class="barra">
    <div id="pasion" class="relleno">
      <img src="Ball.png" class="ball">
    </div>
  </div>

  <div id="barra-tension" class="barra">
    <div id="tension" class="relleno">
      <img src="Ball.png" class="ball">
    </div>
  </div>

  <div id="barra-familia" class="barra">
    <div id="familia" class="relleno">
      <img src="Ball.png" class="ball">
    </div>
  </div>

  <div id="barra-cerveza" class="barra">
    <div id="cerveza" class="relleno">
      <img src="Ball.png" class="ball">
    </div>
  </div>

  <!-- PORCENTAJES -->
  <div id="pasion-texto" class="porcentaje">
    <span class="numero">0</span><span class="simbolo">%</span>
  </div>

  <div id="tension-texto" class="porcentaje">
    <span class="numero">0</span><span class="simbolo">%</span>
  </div>

  <div id="familia-texto" class="porcentaje">
    <span class="numero">0</span><span class="simbolo">%</span>
  </div>

  <div id="cerveza-texto" class="porcentaje">
    <span class="numero">0</span><span class="simbolo">%</span>
  </div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxCRYw26GF73jfQ9Y0ptihuo6V9cApb9mv-Da4CMmDy_ZVQhDe-4s3jxmFJX77zQK0S_A/exec";

/* 🔥 ESCALADO PRO (NO SE MUEVE NADA) */
function escalarPantalla() {
  const baseWidth = 2560;
  const baseHeight = 1440;

  const escalaX = window.innerWidth / baseWidth;
  const escalaY = window.innerHeight / baseHeight;

  const escala = Math.max(escalaX, escalaY);

  const contenedor = document.getElementById("contenedor");

  contenedor.style.transform = `scale(${escala})`;

  const offsetX = (window.innerWidth - baseWidth * escala) / 2;
  const offsetY = (window.innerHeight - baseHeight * escala) / 2;

  contenedor.style.left = offsetX + "px";
  contenedor.style.top = offsetY + "px";
}

window.addEventListener("resize", escalarPantalla);
escalarPantalla();


function actualizar() {
  fetch(URL)
    .then(r => r.json())
    .then(data => {

      const resultados = data.resultados;

      const pasion = Math.round(resultados["Pasión"].porcentaje);
      const tension = Math.round(resultados["Tensión"].porcentaje);
      const familia = Math.round(resultados["Familia y amigos"].porcentaje);
      const cerveza = Math.round(resultados["Cerveza"].porcentaje);

      document.getElementById("pasion").style.width = pasion + "%";
      document.getElementById("tension").style.width = tension + "%";
      document.getElementById("familia").style.width = familia + "%";
      document.getElementById("cerveza").style.width = cerveza + "%";

      document.querySelector("#pasion-texto .numero").innerText = pasion;
      document.querySelector("#tension-texto .numero").innerText = tension;
      document.querySelector("#familia-texto .numero").innerText = familia;
      document.querySelector("#cerveza-texto .numero").innerText = cerveza;

    });
}

actualizar();
setInterval(actualizar, 5000);

</script>

</body>
</html>
